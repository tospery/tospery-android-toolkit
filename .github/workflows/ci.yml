name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Toolkit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Android SDK 37
        shell: bash
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            --sdk_root="$ANDROID_HOME" \
            --install "platforms;android-37.0"

      - name: Run checks
        run: ./gradlew --no-daemon clean check

      - name: Publish to Maven Local
        run: ./gradlew --no-daemon publishToMavenLocal

      - name: Verify Maven Local publications
        run: python3 scripts/verify_maven_local.py

      - name: Verify tracked files are unchanged
        run: git diff --exit-code

      - name: Upload reports after failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: toolkit-reports-${{ github.run_attempt }}
          path: |
            **/build/reports/**
          if-no-files-found: ignore
          retention-days: 7
